<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/jarvis.css">
    <style>
        body {
            width: 400px;
            height: 500px;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .container {
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 6px;
        }
        .user { color: #fff; background: rgba(255,255,255,0.1); }
        .jarvis { color: var(--jarvis-blue); font-weight: 500; }
        .system-status { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="jarvis-hud jarvis-hex-grid">
    <div class="container">
        <div class="system-status jarvis-glow-text">System Status: <span id="status">Online</span></div>
        <h2 class="jarvis-glow-text" style="margin: 10px 0;">J.A.R.V.I.S</h2>
        
        <div id="chat-window">
            <div class="message jarvis">Hello, sir. How can I assist you with your browsing session today?</div>
        </div>

        <div id="settings-pane" style="display:none; padding: 10px; background: rgba(0,0,0,0.5); margin-bottom: 10px;">
            <input type="password" id="api-key" class="jarvis-input" placeholder="Enter AI API Key...">
            <select id="model-select" class="jarvis-input" style="margin-top:5px;">
                <option value="gpt-4o">OpenAI GPT-4o</option>
                <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="user-input" class="jarvis-input" placeholder="Awaiting command...">
            <button id="send-btn" class="jarvis-button">SEND</button>
        </div>
        
        <div style="margin-top: 10px; font-size: 12px; display: flex; justify-content: space-between;">
            <span id="mcp-indicator" style="color: #666;">MCP: Disconnected</span>
            <a href="#" id="toggle-settings" style="color: var(--jarvis-blue); text-decoration: none;">SETTINGS</a>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
